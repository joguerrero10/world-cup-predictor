server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets con cache largo (Vite los hashea por contenido)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para API v1 y endpoints legacy → FastAPI
    location ~ ^/(api|health|elo-rankings|predict-match|team-probabilities|simulate-tournament|model-performance|retrain|load-from-db|train-form-model|load-factors|docs|openapi\.json|redoc) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: todo lo demás sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
