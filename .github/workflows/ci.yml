name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        run: ruff check app tests etl || true
      - name: Run verification suites
        run: |
          python -m tests.verify
          python -m tests.verify_stage2
          python -m tests.verify_stage3
        env:
          DATABASE_URL: "sqlite:///./ci.db"
